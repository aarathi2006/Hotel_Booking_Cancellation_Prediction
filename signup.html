{% extends 'layout.html' %}

{% block content %}

<div class="container">

<div class="card">

<img src="{{url_for('static',filename='images/logo.png')}}" class="logo">

<h1>Create Account</h1>

<form method="POST">

<input

type="text"

name="fullname"

placeholder="Full Name"

required>

<input

type="email"

name="email"

placeholder="Email"

required>

<input

type="password"

name="password"

placeholder="Password"

required>

<button>

Register

</button>

</form>

<p>

Already Registered?

<a href="{{url_for('login')}}">Login</a>

</p>

</div>

</div>

{% endblock %}
